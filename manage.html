<html>
<head>
  <title>SkyFleet - Manage Booking</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #c9d6ff, #e2e2e2);
      margin: 0;
      padding: 2rem;
      color: #333;
    }

    h1 {
      text-align: center;
      color: #003366;
    }

    .container {
      max-width: 700px;
      margin: auto;
      background: white;
      padding: 2rem;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: bold;
    }

    input, select {
      width: 100%;
      padding: 0.5rem;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      background-color: #0077b6;
      color: white;
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 5px;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 1rem;
    }

    button:hover {
      background-color: #005f8a;
    }

    .section-title {
      margin-top: 2rem;
      font-size: 1.2rem;
      color: #005f8a;
    }

    /* Carousel styling */
    .carousel {
      position: relative;
      max-width: 700px;
      margin: 2rem auto;
      overflow: hidden;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .carousel img {
      width: 100%;
      display: none;
    }

    .carousel img.active {
      display: block;
    }

    .carousel-controls {
      position: absolute;
      top: 50%;
      width: 100%;
      display: flex;
      justify-content: space-between;
      transform: translateY(-50%);
    }

    .carousel-controls button {
      background: rgba(0,0,0,0.5);
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      cursor: pointer;
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <h1>Manage Your Flight - SkyFleet</h1>
  <div class="container">
   
    <div class="form-group">
      <h2 class="section-title">Cancel Flight</h2>
      <label for="cancel-ref">Booking Reference</label>
      <input type="text" id="cancel-ref" placeholder="Enter booking reference">
      <button onclick="cancelFlight()">Cancel Ticket</button>
    </div>

    <div class="form-group">
      <h2 class="section-title">Choose Seat</h2>
      <label for="seat-ref">Booking Reference</label>
      <input type="text" id="seat-ref" placeholder="Enter booking reference">
      <label for="seat-number">Select Seat</label>
      <select id="seat-number">
        <option value="">--Choose--</option>
        <option>1A</option>
        <option>1B</option>
        <option>2A</option>
        <option>2B</option>
        <option>3A</option>
        <option>3B</option>
      </select>
      <button onclick="chooseSeat()">Confirm Seat</button>
    </div>

    <div class="form-group">
      <h2 class="section-title">Check-In</h2>
      <label for="checkin-ref">Booking Reference</label>
      <input type="text" id="checkin-ref" placeholder="Enter booking reference">
      <button onclick="checkIn()">Check In</button>
    </div>
  </div>

  <div class="carousel">
    <img src="c:\Users\Rose\Downloads\download (2).jpeg" class="active">
    <img src="c:\Users\Rose\Downloads\download.png">
    <img src="c:\Users\Rose\Downloads\download (3).jpeg">
    <div class="carousel-controls">
      <button onclick="prevSlide()">❮</button>
      <button onclick="nextSlide()">❯</button>
    </div>
  </div>

  <script>
    function ajaxRequest(url, successCallback) {
      const xhr = new XMLHttpRequest();
      xhr.open("GET", url, true);

      xhr.onload = function() {
        if (xhr.status >= 200 && xhr.status < 300) {
          successCallback(xhr.responseText);
        } else {
          alert(`Error: ${xhr.status} - ${xhr.statusText}`);
        }
      };

      xhr.onerror = function() {
        alert("Network Error: Unable to reach server.");
      };

      xhr.ontimeout = function() {
        alert("Request timed out. Please try again.");
      };

      xhr.timeout = 5000; 
      xhr.send();
    }

    function cancelFlight() {
      const ref = document.getElementById('cancel-ref').value;
      if (ref) {
     
        ajaxRequest("fake-api/cancel?ref=" + ref, function(response) {
          alert(`Flight with reference ${ref} has been canceled.`);
        });
      } else {
        alert("Please enter a booking reference.");
      }
    }

    function chooseSeat() {
      const ref = document.getElementById('seat-ref').value;
      const seat = document.getElementById('seat-number').value;
      if (ref && seat) {
        ajaxRequest("fake-api/seat?ref=" + ref + "&seat=" + seat, function(response) {
          alert(`Seat ${seat} has been assigned to booking ${ref}.`);
        });
      } else {
        alert("Please enter booking reference and select a seat.");
      }
    }

    function checkIn() {
      const ref = document.getElementById('checkin-ref').value;
      if (ref) {
        ajaxRequest("fake-api/checkin?ref=" + ref, function(response) {
          alert(`Check-in successful for booking ${ref}.`);
        });
      } else {
        alert("Please enter a booking reference.");
      }
    }

    let currentSlide = 0;
    const slides = document.querySelectorAll(".carousel img");

    function showSlide(index) {
      slides.forEach((slide, i) => {
        slide.classList.remove("active");
        if (i === index) slide.classList.add("active");
      });
    }

    function nextSlide() {
      currentSlide = (currentSlide + 1) % slides.length;
      showSlide(currentSlide);
    }

    function prevSlide() {
      currentSlide = (currentSlide - 1 + slides.length) % slides.length;
      showSlide(currentSlide);
    }

    setInterval(nextSlide, 4000);
  </script>
</body>
</html>
